<div class="p-6">
  <h1 class="text-2xl font-semibold mb-6">Thêm mới</h1>

  <form class="space-y-6" [formGroup]="form" (ngSubmit)="submit()">
    <div>
      <label htmlFor="text" class="block font-medium mb-1"> Tiêu đề </label>
      <input
        type="text"
        formControlName="title"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      @if(form.get('title')?.touched&&form.get('title')?.errors){
        <p class="text-red-500">Tiêu đề phải 5 kí tự trở lên</p>
      }
    </div>
    <div>
      <label htmlFor="text" class="block font-medium mb-1">Tác giả </label>
      <input
        type="text"
        formControlName="author"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      @if(form.get('author')?.touched&&form.get('author')?.errors){
        <p class="text-red-500">Tác giả không được để trống</p>
      }
    </div>
    <div>
      <label htmlFor="text" class="block font-medium mb-1"> Ảnh </label>
      <input
        type="text"
        formControlName="coverImage"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>
    <div>
      <label htmlFor="text" class="block font-medium mb-1"> Thể loại </label>
      <select formControlName="genre" class="w-full border rounded-lg px-3 py-2 text-center">
        <option value="action">Action</option>
        <option value="manhua">Manhua</option>
        <option value="manga">Manga</option>
        <option value="adventure">Adventure</option>
        <option value="comedy-sci-fi">Comedy / Sci-fi</option>
        <option value="dark-fantasy">Dark Fantasy</option>
        <option value="supernatural">Supernatural</option>
      </select>
      @if(form.get('genre')?.touched&&form.get('genre')?.errors){
        <p class="text-red-500">Vui lòng chọn thể loại</p>
      }
    </div>
    <div>
      <label class="block font-medium mb-1">Năm xuất bản</label>
      <input
        type="text"
        formControlName="year"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>
    <button
      type="submit"
      [disabled]="form.invalid"
      class="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"
    >
      Submit
    </button>
  </form>
</div>
